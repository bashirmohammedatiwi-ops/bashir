<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كتالوج مسواگ Miswag — مباشر</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <a href="../" class="hub-back" title="العودة لاختيار المتجر">← المتاجر</a>
        <div class="logo">مسواگ Miswag</div>
        <div class="logo-sub">كتالوج مباشر — الجمال والعناية</div>
        <button type="button" class="sidebar-close" id="sidebarClose" aria-label="إغلاق">×</button>
      </div>
      <div class="sidebar-search">
        <input type="search" id="globalSearch" placeholder="بحث في المنتجات..." autocomplete="off" />
      </div>
      <nav class="cat-tree" id="catTree">
        <div class="loading-tree">جاري تحميل التصنيفات...</div>
      </nav>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main">
      <header class="topbar">
        <button type="button" class="menu-btn" id="menuBtn" aria-label="القائمة">☰</button>
        <div class="topbar-title" id="pageTitle">اختر تصنيفاً</div>
        <div class="topbar-stats" id="pageStats"></div>
      </header>

      <div class="filters-bar hidden" id="filtersBar">
        <label class="filter-label">الترتيب</label>
        <select id="sortFilter">
          <option value="default">الافتراضي</option>
          <option value="name_asc">الاسم: أ-ي</option>
          <option value="name_desc">الاسم: ي-أ</option>
          <option value="price_asc">السعر: من الأقل</option>
          <option value="price_desc">السعر: من الأعلى</option>
        </select>
      </div>

      <div class="content" id="content">
        <div class="welcome" id="welcome">
          <h1>مرحباً في كتالوج مسواگ</h1>
          <p>اختر تصنيفاً من القائمة أو ابحث عن منتج. البيانات تُجلب مباشرة من <strong>miswag.com</strong>.</p>
          <p class="welcome-note">قسم الجمال والعناية: <a href="https://miswag.com/l1-categories/beauty" target="_blank" rel="noopener">miswag.com/l1-categories/beauty</a></p>
          <div class="welcome-stats" id="welcomeStats"></div>
        </div>
        <div class="grid" id="grid"></div>
        <div class="load-more-wrap hidden" id="loadMoreWrap">
          <button type="button" class="btn" id="loadMoreBtn">تحميل المزيد</button>
        </div>
        <div class="status-msg hidden" id="statusMsg"></div>
      </div>
    </main>

    <aside class="product-panel" id="productPanel" aria-hidden="true">
      <div class="panel-head">
        <button type="button" class="panel-close" id="panelClose">×</button>
        <span id="panelTitle">تفاصيل المنتج</span>
      </div>
      <div class="panel-body" id="panelBody">
        <div class="panel-loading">جاري التحميل...</div>
      </div>
    </aside>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
