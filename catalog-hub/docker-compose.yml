# Catalog Hub — Nice One · Vanilla · Elryan · Miraaya · Faces
# الاستيراد من لوحة تحكم Alhayaa عبر المنفذ 10000

services:
  catalog-hub:
    build:
      context: .
      dockerfile: Dockerfile
    image: catalog-hub:latest
    container_name: catalog-hub
    restart: unless-stopped
    ports:
      - "${CATALOG_HUB_PORT:-10000}:10000"
    environment:
      NODE_ENV: production
      PORT: 10000
      HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      CATALOG_HUB_PUBLIC_PREFIX: /catalog-hub
    volumes:
      # يحفظ فهارس الباركود والكاش بين إعادة التشغيل
      - catalog_hub_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:10000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  catalog_hub_data:
