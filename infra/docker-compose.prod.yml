# Alhayaa — production stack (single VPS)
# Backend API + PostgreSQL + Redis + Nginx + HTTPS + media on same host

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alhayaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-alhayaa}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alhayaa} -d ${POSTGRES_DB:-alhayaa}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-alhayaa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-alhayaa}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-2592000}
      MEDIA_ROOT: /data/uploads
      MEDIA_PUBLIC_PREFIX: /media
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://${DOMAIN}/media}
      MEDIA_MAX_FILE_SIZE_MB: ${MEDIA_MAX_FILE_SIZE_MB:-15}
      MEDIA_MAX_ORIGINAL_WIDTH: ${MEDIA_MAX_ORIGINAL_WIDTH:-1920}
      MEDIA_WEBP_QUALITY: ${MEDIA_WEBP_QUALITY:-80}
      MEDIA_JPEG_QUALITY: ${MEDIA_JPEG_QUALITY:-82}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-300}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@alhayaa.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@12345}
      RUN_SEED: ${RUN_SEED:-0}
    volumes:
      - mediadata:/data/uploads
    expose:
      - "3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s

  catalog-hub:
    build:
      context: ../catalog-hub
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 10000
      HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - catalog_hub_data:/app/data
    expose:
      - "10000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:10000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      catalog-hub:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl-params.conf:/etc/nginx/conf.d/ssl-params.conf:ro
      - mediadata:/var/www/alhayaa/uploads:ro
      - ./admin-static:/var/www/alhayaa/admin:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - internal
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"

volumes:
  pgdata:
  redisdata:
  mediadata:
  catalog_hub_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
