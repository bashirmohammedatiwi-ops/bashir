upstream alhayaa_api {
    server api:3000;
    keepalive 64;
}

# catalog-hub: lazy DNS — nginx يقلع حتى لو catalog-hub يعيد التشغيل
resolver 127.0.0.11 valid=10s ipv6=off;

open_file_cache max=10000 inactive=30s;
open_file_cache_valid 60s;
open_file_cache_min_uses 2;
open_file_cache_errors on;

proxy_buffering on;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 25m;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://alhayaa_api;
    }

    location /catalog-hub/ {
        set $catalog_hub_backend catalog-hub:10000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 240s;
        proxy_read_timeout 240s;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_pass http://$catalog_hub_backend;
    }

    location /media/ {
        alias /var/www/alhayaa/uploads/;
        access_log off;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        etag on;
    }

    location / {
        root /var/www/alhayaa/admin;
        index index.html;
        try_files $uri $uri/ $uri/index.html /index.html =404;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
