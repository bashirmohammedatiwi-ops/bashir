name: alhayaa
description: "الحياة - متجر مستحضرات التجميل الفاخر"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^13.0.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.10
  intl: ^0.20.2
  url_launcher: ^6.2.6
  pinput: ^5.0.0
  flutter_rating_bar: ^4.0.1
  image_picker: ^1.0.7
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/icons/
    - assets/products/
